name: Coletar Clima Pedal Rio

on:
  schedule:
    # GitHub Actions uses UTC. Target: run by 18:00 BRT (21:00 UTC),
    # giving ~2h buffer before the 20:00 BRT Routine reads the file.
    # BRT = UTC - 3.
    - cron: '0 21 * * *'
  workflow_dispatch:   # allows manual run from the GitHub website

permissions:
  contents: write   # required for the workflow to commit the file to the repo

jobs:
  buscar-clima:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch weather from Open-Meteo
        run: python buscar_clima.py

      - name: Commit and push result
        run: |
          git config user.name "Pedal Rio Bot"
          git config user.email "bot@pedalrio.local"
          git add config/clima-amanha.json
          git diff --staged --quiet || git commit -m "Clima atualizado [automático]"
          git push
